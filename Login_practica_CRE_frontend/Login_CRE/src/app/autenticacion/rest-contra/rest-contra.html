<div class="contenedor">
    <div class="VTN_SLT">
        <h2>Restablecer contraseña</h2>
        <p>Ingrese su correo electrónico para recibir el enlace de recuperación.</p>
        
        
        <form #formCorreo="ngForm" (ngSubmit)="solicitar(formCorreo)">
            <div class="input-group" >
                <input type="email" placeholder="Correo electrónico" [(ngModel)]="correo" 
                name="correo" required email #correoInput="ngModel" (ngModelChange)="mostrarErrores = false">
            </div>
            @if (correoInput.invalid && mostrarErrores) {
                <small class="texto-error" >
                    {{ getEmailErrorMessage(correoInput) }}
                </small>  
            }

            <button type="submit">Solicitar enlace</button>
        </form>

        @if (mensajeExito) {
            <div class="fondo_mensaje">
                <div class="mensaje">
                    <p>solicitud enviada correctamente</p>
                    <button #btnLogin (click)="irLogin()">
                        Ir al login
                    </button>
                </div>
            </div>
        }


    </div>
</div>
