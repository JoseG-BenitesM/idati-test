<div class="contenedor">
    <div class="VTN_SLT">
        <h2>Restablecer contraseña</h2>
        <p>Ingrese su correo electrónico para recibir el enlace de recuperación.</p>
        
        
        <form (ngSubmit)="solicitar()">
            <div class="input-group" >
                <input type="email" placeholder="Correo electrónico" [(ngModel)]="correo" name="correo" required>
            </div>

            <button type="submit">Solicitar enlace</button>
            </form>

        @if (mensajeExito) {
            <div class="fondo_mensaje">
                <div class="mensaje">
                    <p>solicitud enviada correctamente</p>
                    <button #btnLogin (click)="irLogin()">
                        Ir al login
                    </button>
                </div>
            </div>
        }


    </div>
</div>
