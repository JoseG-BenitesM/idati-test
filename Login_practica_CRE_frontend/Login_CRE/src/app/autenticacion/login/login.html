<div class="formulario">
    <h1>Login</h1>
        
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        
        <div class="campo-formulario">
            <label class="campo">Email</label>
            <input 
                class="control-formulario" 
                [class.input-error]="(loginForm.get('email')?.invalid && loginForm.get('email')?.touched) || (submitted && loginForm.get('email')?.invalid)"
                type="email" 
                formControlName="email" 
                placeholder="ejemplo@empresa.com"/>
            
            <div *ngIf="(loginForm.get('email')?.invalid && loginForm.get('email')?.touched) || submitted">
                <small *ngIf="loginForm.get('email')?.invalid" class="texto-error">
                    {{ getEmailErrorMessage() }}
                </small>
            </div>
        </div>

        <div class="campo-formulario">
            <label class="campo">Contraseña (
                <span class="toggle-password" (click)="togglePasswordVisibility()">
                    {{ showPassword ? 'Ocultar' : 'Mostrar' }}
                </span>
            )</label>
            <input 
                class="control-formulario" 
                [class.input-error]="(loginForm.get('password')?.invalid && loginForm.get('password')?.touched) || (submitted && loginForm.get('password')?.invalid)"
                [type]="showPassword ? 'text' : 'password'" 
                formControlName="password" 
                placeholder="Ingrese su contraseña"/>

            <div *ngIf="(loginForm.get('password')?.invalid && loginForm.get('password')?.touched) || submitted">
                <small *ngIf="loginForm.get('password')?.errors?.['required']" class="texto-error">
                    Falta ingresar la contraseña.
                </small>
                <small *ngIf="loginForm.get('password')?.errors?.['minlength']" class="texto-error">
                    La contraseña es muy corta (mínimo 6 caracteres).
                </small>
            </div>
        </div>

        <a routerLink="/restaurar-contraseña">¿Olvidó su contraseña?</a>

        <button type="submit" class="boton-submit">
            Ingresar
        </button>
    </form>
</div>
