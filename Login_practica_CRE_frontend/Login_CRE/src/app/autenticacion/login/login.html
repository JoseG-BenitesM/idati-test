<div class="formulario">
    <h1>Login</h1>
        
    <form>
        <div class="campo-formulario">
            <label class="campo">Email</label>
            <input class="control-formulario" type="email" placeholder="Ingrese su email"/>
        </div>
        <div class="campo-formulario">
            <label class="campo">Contraseña (
                <span class="toggle-password" (click)="togglePasswordVisibility()">{{ showPassword ? 'Ocultar' : 'Mostrar' }}</span>
            )</label>
            <input class="control-formulario" [type]="showPassword ? 'text' : 'password'" placeholder="Ingrese su contraseña"/>
        </div>
        <a href="">¿Olvidó su contraseña?</a>
        <button class="boton-submit">Ingresar</button>
    </form>
</div>
