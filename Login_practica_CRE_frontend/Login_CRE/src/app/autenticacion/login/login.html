<!-- Acá iría la pantalla del login -->

<h1>Login</h1>
    
<form>
    <div class="campo-formulario">
        <label class="campo">Email</label>
        <input class="control-formulario"type="email" placeholder="Ingrese su email"/>
    </div>
    <div class="campo-formulario">
        <label class="campo">Contraseña</label>
        <input class="control-formulario"type="password" placeholder="Ingrese su contraseña"/>
    </div>
    <button class="boton-submit">Ingresar</button>
</form>
