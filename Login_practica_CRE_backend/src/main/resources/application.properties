spring.application.name=Login_practica_CRE_backend

# ===============================
# ConfiguraciÛn de la base de datos
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/capacitacion_CRE
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# Correo Gmail SMTP
# Puerto 587 es el est·ndar para SMTP con STARTTLS
# Puerto 465 serÌa para SSL directo
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# ContraseÒa de aplicaciÛn generada en Google
spring.mail.username=tu correof@gmail.com
# NO es tu contraseÒa normal de Gmail
spring.mail.password=xxxx xxxx xxxx xxxx

# Requiere autenticaciÛn para enviar correos
spring.mail.properties.mail.smtp.auth=true
# STARTTLS: inicia la conexiÛn sin cifrado y la eleva a cifrada
spring.mail.properties.mail.smtp.starttls.enable=true
# Es el mecanismo de seguridad que usa Gmail en el puerto 587
spring.mail.properties.mail.smtp.starttls.required=true

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=validate

# validate ? Hibernate compara las entidades contra la BD al arrancar.
# Si hay diferencias lanza error ? no crea ni modifica tablas.
# Otras opciones:
# create     ? crea tablas desde cero cada vez (borra datos)
# update     ? actualiza tablas sin borrar datos
# create-drop ? crea al arrancar y borra al apagar
# none       ? no hace nada
